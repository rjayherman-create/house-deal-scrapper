<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>House Deal Scraper</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #151d33;
      --border: #2d3651;
      --text: #f4f7ff;
      --muted: #9fb0d9;
      --accent: #5b8cff;
      --error: #ff6f6f;
    }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }
    .sticky-panel {
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1, h2 {
      margin-top: 0;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
    }
    label {
      font-size: 14px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label.inline {
      flex-direction: row;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }
    input[type="text"], input[type="number"], input[type="file"], select, textarea {
      background: #0e1426;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 8px;
      min-width: 160px;
    }
    textarea {
      width: 100%;
      min-height: 72px;
      resize: vertical;
      box-sizing: border-box;
    }
    button {
      background: var(--accent);
      border: none;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary {
      background: #293353;
    }
    .result-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #0d1429;
    }
    .listing-layout {
      display: grid;
      grid-template-columns: 132px 1fr;
      gap: 12px;
    }
    .listing-photo {
      width: 132px;
      height: 96px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #111a31;
    }
    .listing-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .listing-actions a {
      color: #cfe0ff;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 9px;
      font-size: 13px;
      background: #17213a;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      background: #203056;
      color: #d8e4ff;
      font-size: 12px;
      font-weight: 700;
      margin-right: 6px;
      margin-top: 8px;
    }
    .muted {
      color: var(--muted);
      font-size: 14px;
    }
    .error {
      color: var(--error);
      font-weight: 600;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .metric {
      border: 1px solid var(--border);
      background: #0e162c;
      border-radius: 10px;
      padding: 10px;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .metric strong {
      font-size: 18px;
    }
    .dashboard-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      background: #0d1429;
      overflow: hidden;
    }
    .dashboard-header {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      cursor: pointer;
    }
    .dashboard-header:hover {
      background: #111b35;
    }
    .dashboard-chevron {
      font-size: 20px;
      color: #d8e4ff;
      width: 24px;
      text-align: center;
    }
    .dashboard-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }
    .dashboard-body {
      border-top: 1px solid var(--border);
      padding: 14px;
      background: #101933;
    }
    .print-report {
      background: white;
      color: #111;
      padding: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>House Deal Scraper</h1>
    <p class="muted">Backend + UI running on the same deployment.</p>

    <div class="panel sticky-panel">
      <h2>Data Sources</h2>
      <p id="sourcesStatus" class="muted">Checking data sources...</p>
      <div id="sourcesResults"></div>
    </div>

    <div class="panel">
      <h2>Analyze Listings</h2>
      <div class="row">
        <label for="city">
          City
          <input id="city" type="text" placeholder="Detroit" autocomplete="address-level2" />
        </label>
        <label for="state">
          State
          <input id="state" type="text" placeholder="MI" maxlength="2" autocomplete="address-level1" />
        </label>
        <label for="maxPrice">
          Max Price
          <input id="maxPrice" type="number" min="0" step="1000" placeholder="150000" />
        </label>
        <label class="inline">
          <input id="photos" type="checkbox" />
          Include photos
        </label>
        <button id="analyzeBtn">Run Analyze</button>
      </div>
      <p id="analyzeStatus" class="muted"></p>
      <div id="analyzeResults"></div>
    </div>

    <div class="panel">
      <h2>AI Property Condition Analyzer</h2>
      <div class="row">
        <label for="conditionAddress">
          Address
          <input id="conditionAddress" type="text" placeholder="123 Main St" />
        </label>
        <label for="conditionCity">
          City
          <input id="conditionCity" type="text" placeholder="Buffalo" />
        </label>
        <label for="conditionState">
          State
          <input id="conditionState" type="text" maxlength="2" placeholder="NY" />
        </label>
        <label for="conditionImages">
          Photos
          <input id="conditionImages" type="file" accept="image/*" multiple />
        </label>
        <button id="conditionBtn">Analyze Photos</button>
      </div>
      <p id="conditionStatus" class="muted"></p>
      <div id="conditionResults"></div>
    </div>

    <div class="panel">
      <h2>Dashboard</h2>
      <div class="row">
        <button id="loadListingsBtn" class="secondary">Load Listings</button>
        <button id="loadDealsBtn" class="secondary">Load High-Score Deals</button>
        <label for="dashboardSearch">
          Search
          <input id="dashboardSearch" type="text" placeholder="Address or city" />
        </label>
        <label for="dashboardScore">
          Min Score
          <select id="dashboardScore">
            <option value="0">All</option>
            <option value="50">50+</option>
            <option value="70">70+</option>
            <option value="85">85+</option>
          </select>
        </label>
        <label for="dashboardSort">
          Sort
          <select id="dashboardSort">
            <option value="score">Deal score</option>
            <option value="newest">Newest</option>
            <option value="price">Price/value</option>
          </select>
        </label>
      </div>
      <p id="listingsStatus" class="muted"></p>
      <div id="listingsResults"></div>
    </div>
  </div>

  <script>
    const analyzeBtn = document.getElementById("analyzeBtn");
    const loadListingsBtn = document.getElementById("loadListingsBtn");
    const loadDealsBtn = document.getElementById("loadDealsBtn");
    const analyzeStatus = document.getElementById("analyzeStatus");
    const listingsStatus = document.getElementById("listingsStatus");
    const conditionBtn = document.getElementById("conditionBtn");
    const conditionStatus = document.getElementById("conditionStatus");
    const conditionResults = document.getElementById("conditionResults");
    const analyzeResults = document.getElementById("analyzeResults");
    const listingsResults = document.getElementById("listingsResults");
    const sourcesStatus = document.getElementById("sourcesStatus");
    const sourcesResults = document.getElementById("sourcesResults");
    const dashboardSearch = document.getElementById("dashboardSearch");
    const dashboardScore = document.getElementById("dashboardScore");
    const dashboardSort = document.getElementById("dashboardSort");
    let dashboardItems = [];
    let expandedProperties = {};

    function renderError(container, message) {
      container.textContent = "";
      const p = document.createElement("p");
      p.className = "error";
      p.textContent = message;
      container.appendChild(p);
    }

    function createListingCard(item) {
      const l = item.listing || item;
      const deal = item.deal_scores || {};
      const raw = l.raw_data || {};
      const source = l.source || "unknown";
      const price = l.price ?? l.asking_price ?? l.estimated_value;
      const priceText = Number.isFinite(price) ? `$${price.toLocaleString()}` : "N/A";
      const cityState = [l.city, l.state].filter(Boolean).join(", ");
      const photos = l.photos || item.photos || [];
      const links = l.links || item.links || {};
      const sourceUrl = l.source_url || raw.source_url || item.source_url || links.source;
      const propertyId = l.property_intelligence_id || (Number.isFinite(l.deal_score) ? l.id : null);
      const card = document.createElement("div");
      card.className = "result-card";

      const layout = document.createElement("div");
      layout.className = "listing-layout";
      if (photos.length) {
        const img = document.createElement("img");
        img.className = "listing-photo";
        img.src = photos[0];
        img.alt = l.address || "Property photo";
        layout.appendChild(img);
      } else {
        const placeholder = document.createElement("div");
        placeholder.className = "listing-photo";
        layout.appendChild(placeholder);
      }

      const body = document.createElement("div");
      const titleRow = document.createElement("div");
      const title = document.createElement("strong");
      title.textContent = l.address || "Unknown address";
      titleRow.appendChild(title);
      body.appendChild(titleRow);

      const location = document.createElement("div");
      location.className = "muted";
      location.textContent = cityState || "Unknown location";
      body.appendChild(location);

      const priceRow = document.createElement("div");
      priceRow.textContent = `Price: ${priceText}`;
      body.appendChild(priceRow);

      const sourceRow = document.createElement("div");
      sourceRow.className = "muted";
      sourceRow.textContent = `Source: ${source}`;
      body.appendChild(sourceRow);

      if (Number.isFinite(deal.final_score) || Number.isFinite(l.deal_score)) {
        const score = document.createElement("span");
        score.className = "badge";
        const scoreValue = Number.isFinite(l.deal_score) ? l.deal_score : Math.round(deal.final_score * 100);
        score.textContent = `Deal Score ${scoreValue}/100`;
        body.appendChild(score);
      }
      if (photos.length) {
        const photoBadge = document.createElement("span");
        photoBadge.className = "badge";
        photoBadge.textContent = `${photos.length} photo${photos.length === 1 ? "" : "s"}`;
        body.appendChild(photoBadge);
      }

      const actions = document.createElement("div");
      actions.className = "listing-actions";
      if (sourceUrl) {
        const link = document.createElement("a");
        link.href = sourceUrl;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = `Open on ${source}`;
        actions.appendChild(link);
      }
      const searchQuery = encodeURIComponent([l.address, l.city, l.state].filter(Boolean).join(" "));
      const searchLinks = [
        ["Zillow", links.zillow || `https://www.zillow.com/homes/${searchQuery}_rb/`],
        ["Realtor", links.realtor || `https://www.realtor.com/realestateandhomes-search/${searchQuery}`],
        ["Redfin", links.redfin || `https://www.redfin.com/homes-for-sale#!search_location=${searchQuery}`],
        ["Maps", links.googleMaps || `https://www.google.com/maps/search/?api=1&query=${searchQuery}`],
      ];
      for (const [label, href] of searchLinks) {
        const link = document.createElement("a");
        link.href = href;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = label;
        actions.appendChild(link);
      }
      if (propertyId) {
        const detail = document.createElement("a");
        detail.href = `/api/properties/${propertyId}`;
        detail.target = "_blank";
        detail.rel = "noopener noreferrer";
        detail.textContent = "Property intelligence";
        actions.appendChild(detail);
      }
      body.appendChild(actions);
      layout.appendChild(body);
      card.appendChild(layout);

      return card;
    }

    function renderMutedMessage(container, message) {
      container.textContent = "";
      const p = document.createElement("p");
      p.className = "muted";
      p.textContent = message;
      container.appendChild(p);
    }

    function renderListingCards(container, items) {
      container.textContent = "";
      const fragment = document.createDocumentFragment();
      for (const item of items) {
        fragment.appendChild(createListingCard(item));
      }
      container.appendChild(fragment);
    }

    function normalizeDashboardProperty(item) {
      const p = item.listing || item.property || item;
      return {
        ...p,
        dealScore: p.dealScore ?? p.deal_score ?? p.property_deal_score ?? 0,
        estimatedRent: p.estimatedRent ?? p.estimated_rent ?? p.rentEstimate ?? p.section8Estimate ?? null,
        estimatedValue: p.estimatedValue ?? p.estimated_value ?? p.price ?? p.asking_price ?? null,
        taxAmountDue: p.taxAmountDue ?? p.tax_amount_due ?? null,
        yearBuilt: p.yearBuilt ?? p.year_built ?? null,
        sourceUrl: p.source_url ?? p.sourceUrl ?? p.links?.source ?? null,
      };
    }

    function money(value) {
      const number = Number(value || 0);
      return number ? `$${number.toLocaleString()}` : "N/A";
    }

    function filteredDashboardItems() {
      const term = dashboardSearch.value.trim().toLowerCase();
      const minScore = Number(dashboardScore.value || 0);
      let items = dashboardItems
        .map(normalizeDashboardProperty)
        .filter((p) => {
          const haystack = [p.address, p.city, p.state, p.county].filter(Boolean).join(" ").toLowerCase();
          return haystack.includes(term) && Number(p.dealScore || 0) >= minScore;
        });
      const sort = dashboardSort.value;
      items.sort((a, b) => {
        if (sort === "newest") return String(b.created_at || "").localeCompare(String(a.created_at || ""));
        if (sort === "price") return Number(a.estimatedValue || 0) - Number(b.estimatedValue || 0);
        return Number(b.dealScore || 0) - Number(a.dealScore || 0);
      });
      return items;
    }

    function exportPropertyPDF(property) {
      const p = normalizeDashboardProperty(property);
      const report = window.open("", "_blank");
      if (!report) return;
      report.document.write(`
        <html>
          <head><title>Investor Report - ${p.address || "Property"}</title></head>
          <body class="print-report">
            <h1>Investor Property Report</h1>
            <h2>${p.address || "Unknown address"}</h2>
            <p>${[p.city, p.state, p.zip].filter(Boolean).join(", ")}</p>
            <hr />
            <h3>Investment Summary</h3>
            <p><strong>Deal Score:</strong> ${p.dealScore || 0}/100</p>
            <p><strong>Estimated Value:</strong> ${money(p.estimatedValue)}</p>
            <p><strong>Estimated Rent:</strong> ${money(p.estimatedRent)}</p>
            <p><strong>Tax Due:</strong> ${money(p.taxAmountDue)}</p>
            <h3>Property Details</h3>
            <p><strong>Bedrooms:</strong> ${p.bedrooms ?? "N/A"}</p>
            <p><strong>Bathrooms:</strong> ${p.bathrooms ?? "N/A"}</p>
            <p><strong>Sqft:</strong> ${p.sqft ?? "N/A"}</p>
            <p><strong>Year Built:</strong> ${p.yearBuilt ?? "N/A"}</p>
            <h3>Distress Flags</h3>
            <p>Tax delinquent: ${p.tax_delinquent || p.taxDelinquent ? "YES" : "NO"}</p>
            <p>Vacant: ${p.vacant ? "YES" : "NO"}</p>
            <p>Foreclosure: ${p.foreclosure ? "YES" : "NO"}</p>
            <p>Probate: ${p.probate ? "YES" : "NO"}</p>
            <h3>Summary</h3>
            <p>${p.ai_summary || "No summary saved."}</p>
          </body>
        </html>
      `);
      report.document.close();
      report.focus();
      report.print();
    }

    async function saveNote(propertyId, textarea) {
      const note = textarea.value.trim();
      if (!note || !propertyId) return;
      const response = await fetch("/api/properties/note", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ propertyId, userId: "dashboard", note }),
      });
      if (!response.ok) throw new Error(`Request failed: ${response.status}`);
      textarea.value = "";
    }

    function renderDashboard() {
      const items = filteredDashboardItems();
      listingsResults.textContent = "";
      const fragment = document.createDocumentFragment();
      for (const property of items) {
        const isOpen = Boolean(expandedProperties[property.id]);
        const card = document.createElement("div");
        card.className = "dashboard-card";

        const header = document.createElement("div");
        header.className = "dashboard-header";
        header.addEventListener("click", () => {
          expandedProperties[property.id] = !expandedProperties[property.id];
          renderDashboard();
        });

        const chev = document.createElement("div");
        chev.className = "dashboard-chevron";
        chev.textContent = isOpen ? "⌄" : "›";
        header.appendChild(chev);

        const title = document.createElement("div");
        const strong = document.createElement("strong");
        strong.textContent = property.address || "Unknown address";
        const sub = document.createElement("div");
        sub.className = "muted";
        sub.textContent = [property.city, property.state, property.zip].filter(Boolean).join(", ");
        title.appendChild(strong);
        title.appendChild(sub);
        header.appendChild(title);

        const stats = document.createElement("div");
        stats.className = "dashboard-stats";
        for (const [label, value] of [["Score", property.dealScore || 0], ["Rent", money(property.estimatedRent)], ["Value", money(property.estimatedValue)]]) {
          const stat = document.createElement("span");
          stat.className = "badge";
          stat.textContent = `${label}: ${value}`;
          stats.appendChild(stat);
        }
        header.appendChild(stats);
        card.appendChild(header);

        if (isOpen) {
          const body = document.createElement("div");
          body.className = "dashboard-body";
          const details = document.createElement("div");
          details.className = "metric-grid";
          const rows = [
            ["Bedrooms", property.bedrooms ?? "N/A"],
            ["Bathrooms", property.bathrooms ?? "N/A"],
            ["Sqft", property.sqft ?? "N/A"],
            ["Year Built", property.yearBuilt ?? "N/A"],
            ["County", property.county ?? "N/A"],
            ["Tax Due", money(property.taxAmountDue)],
            ["Vacant", property.vacant ? "YES" : "NO"],
            ["Foreclosure", property.foreclosure ? "YES" : "NO"],
          ];
          for (const [label, value] of rows) {
            const box = document.createElement("div");
            box.className = "metric";
            const s = document.createElement("span");
            s.textContent = label;
            const v = document.createElement("strong");
            v.textContent = String(value);
            box.appendChild(s);
            box.appendChild(v);
            details.appendChild(box);
          }
          body.appendChild(details);

          const summary = document.createElement("p");
          summary.className = "muted";
          summary.textContent = property.ai_summary || "No investor summary saved yet.";
          body.appendChild(summary);

          const actions = document.createElement("div");
          actions.className = "listing-actions";
          const links = property.links || {};
          for (const [label, href] of Object.entries({
            Source: property.sourceUrl || links.source,
            Zillow: links.zillow,
            Realtor: links.realtor,
            Redfin: links.redfin,
            Maps: links.googleMaps,
          })) {
            if (!href) continue;
            const a = document.createElement("a");
            a.href = href;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.textContent = label;
            actions.appendChild(a);
          }
          const pdf = document.createElement("button");
          pdf.className = "secondary";
          pdf.textContent = "Export PDF Report";
          pdf.addEventListener("click", (event) => {
            event.stopPropagation();
            exportPropertyPDF(property);
          });
          actions.appendChild(pdf);
          body.appendChild(actions);

          const note = document.createElement("textarea");
          note.placeholder = "Add investor note...";
          body.appendChild(note);
          const save = document.createElement("button");
          save.className = "secondary";
          save.textContent = "Save Note";
          save.addEventListener("click", async (event) => {
            event.stopPropagation();
            try {
              await saveNote(property.id, note);
              listingsStatus.textContent = "Note saved.";
            } catch (err) {
              listingsStatus.textContent = `Note failed: ${err.message}`;
            }
          });
          body.appendChild(save);
          card.appendChild(body);
        }

        fragment.appendChild(card);
      }
      listingsResults.appendChild(fragment);
      listingsStatus.textContent = `Showing ${items.length} propert${items.length === 1 ? "y" : "ies"}.`;
    }

    function renderConditionResult(result) {
      conditionResults.textContent = "";
      const card = document.createElement("div");
      card.className = "result-card";

      const title = document.createElement("strong");
      title.textContent = "Investment Analysis";
      card.appendChild(title);

      const metrics = document.createElement("div");
      metrics.className = "metric-grid";
      const metricRows = [
        ["Condition Score", `${result.conditionScore ?? 0}/100`],
        ["Estimated Rehab", `$${Number(result.rehabEstimate || 0).toLocaleString()}`],
        ["Estimated ARV", `$${Number(result.arv || 0).toLocaleString()}`],
        ["Estimated Rent", `$${Number(result.rentEstimate || 0).toLocaleString()}/mo`],
        ["Flip Potential", result.flipPotential || "Unknown"],
        ["Rental Potential", result.rentalPotential || "Unknown"],
        ["Section 8", result.section8Suitability || "Unknown"],
      ];
      for (const [label, value] of metricRows) {
        const box = document.createElement("div");
        box.className = "metric";
        const labelEl = document.createElement("span");
        labelEl.textContent = label;
        const valueEl = document.createElement("strong");
        valueEl.textContent = value;
        box.appendChild(labelEl);
        box.appendChild(valueEl);
        metrics.appendChild(box);
      }
      card.appendChild(metrics);

      const breakdown = document.createElement("div");
      breakdown.className = "metric-grid";
      for (const [key, value] of Object.entries(result.conditionBreakdown || {})) {
        const box = document.createElement("div");
        box.className = "metric";
        const labelEl = document.createElement("span");
        labelEl.textContent = key;
        const valueEl = document.createElement("strong");
        valueEl.textContent = String(value);
        box.appendChild(labelEl);
        box.appendChild(valueEl);
        breakdown.appendChild(box);
      }
      card.appendChild(breakdown);

      if (Array.isArray(result.warnings) && result.warnings.length) {
        const warnings = document.createElement("p");
        warnings.className = "error";
        warnings.textContent = `Warnings: ${result.warnings.join("; ")}`;
        card.appendChild(warnings);
      }

      const summary = document.createElement("p");
      summary.className = "muted";
      summary.textContent = result.summary || "No summary returned.";
      card.appendChild(summary);
      conditionResults.appendChild(card);
    }

    function renderSources(data) {
      sourcesResults.textContent = "";
      const missing = data.required_setup || [];
      sourcesStatus.textContent = data.primary_ready
        ? "Primary API source is configured. Running live connectivity check..."
        : "Primary API source is missing. Add RENTCAST_API_KEY in Railway for live analysis.";

      if (data.live_check && data.live_check.rentcast) {
        const check = data.live_check.rentcast;
        sourcesStatus.textContent = check.message || sourcesStatus.textContent;
      }

      if (missing.length) {
        const warning = document.createElement("p");
        warning.className = "error";
        warning.textContent = missing.map((source) => `${source.name}: set ${source.env_var}`).join(" | ");
        sourcesResults.appendChild(warning);
      }

      for (const source of data.sources || []) {
        const card = document.createElement("div");
        card.className = "result-card";
        const title = document.createElement("strong");
        title.textContent = `${source.name} - ${source.status}`;
        card.appendChild(title);
        const purpose = document.createElement("div");
        purpose.className = "muted";
        purpose.textContent = source.purpose;
        card.appendChild(purpose);
        sourcesResults.appendChild(card);
      }
    }

    async function loadSources() {
      try {
        const response = await fetch("/data-sources");
        if (!response.ok) throw new Error(`Request failed: ${response.status}`);
        renderSources(await response.json());
      } catch (err) {
        sourcesStatus.textContent = "";
        renderError(sourcesResults, `Could not load source status: ${err.message}`);
      }
    }

    analyzeBtn.addEventListener("click", async () => {
      analyzeResults.textContent = "";
      const city = document.getElementById("city").value.trim();
      const state = document.getElementById("state").value.trim();
      const maxPrice = document.getElementById("maxPrice").value.trim();
      const includePhotos = document.getElementById("photos").checked;

      if (!city || !state) {
        analyzeStatus.textContent = "";
        renderError(analyzeResults, "City and state are required.");
        return;
      }

      analyzeStatus.textContent = "Running analysis...";
      try {
        const params = new URLSearchParams({
          city,
          state,
          include_photos: String(includePhotos),
        });
        if (maxPrice) params.set("max_price", maxPrice);
        const response = await fetch(`/analyze?${params.toString()}`);
        if (!response.ok) {
          const errorBody = await response.json().catch(() => null);
          throw new Error(errorBody?.detail || `Request failed: ${response.status}`);
        }
        const data = await response.json();
        if (!Array.isArray(data) || data.length === 0) {
          analyzeStatus.textContent = "Found 0 analyzed listing(s).";
          renderMutedMessage(analyzeResults, "No listings returned. Check Data Sources above and add RENTCAST_API_KEY in Railway for reliable live listings.");
          return;
        }
        analyzeStatus.textContent = `Found ${data.length} analyzed listing(s).`;
        renderListingCards(analyzeResults, data);
      } catch (err) {
        analyzeStatus.textContent = "";
        renderError(analyzeResults, `Analyze failed: ${err.message}`);
      }
    });

    loadListingsBtn.addEventListener("click", async () => {
      listingsResults.textContent = "";
      listingsStatus.textContent = "Loading saved listings...";
      try {
        const response = await fetch("/listings");
        if (!response.ok) {
          throw new Error(`Request failed: ${response.status}`);
        }
        const data = await response.json();
        const listings = data.listings || [];
        if (!listings.length) {
          listingsStatus.textContent = "Loaded 0 saved listing(s).";
          renderMutedMessage(listingsResults, "No saved listings yet.");
          return;
        }
        dashboardItems = listings;
        renderDashboard();
      } catch (err) {
        listingsStatus.textContent = "";
        renderError(listingsResults, `Load failed: ${err.message}`);
      }
    });

    loadDealsBtn.addEventListener("click", async () => {
      listingsResults.textContent = "";
      listingsStatus.textContent = "Loading high-score deals...";
      try {
        const response = await fetch("/api/properties/high-deals");
        if (!response.ok) {
          throw new Error(`Request failed: ${response.status}`);
        }
        const data = await response.json();
        const listings = data.data || [];
        if (!listings.length) {
          listingsStatus.textContent = "Loaded 0 deal(s).";
          renderMutedMessage(listingsResults, "No property intelligence records yet. Run Analyze first.");
          return;
        }
        dashboardItems = listings;
        renderDashboard();
      } catch (err) {
        listingsStatus.textContent = "";
        renderError(listingsResults, `Dashboard failed: ${err.message}`);
      }
    });

    dashboardSearch.addEventListener("input", renderDashboard);
    dashboardScore.addEventListener("change", renderDashboard);
    dashboardSort.addEventListener("change", renderDashboard);

    conditionBtn.addEventListener("click", async () => {
      conditionResults.textContent = "";
      const files = document.getElementById("conditionImages").files;
      if (!files || !files.length) {
        conditionStatus.textContent = "";
        renderError(conditionResults, "Upload at least one property photo.");
        return;
      }
      const formData = new FormData();
      for (const file of files) formData.append("images", file);
      formData.append("address", document.getElementById("conditionAddress").value.trim());
      formData.append("city", document.getElementById("conditionCity").value.trim());
      formData.append("state", document.getElementById("conditionState").value.trim());

      conditionStatus.textContent = "Analyzing property photos...";
      try {
        const response = await fetch("/api/analyze-property", {
          method: "POST",
          body: formData,
        });
        if (!response.ok) {
          const errorBody = await response.json().catch(() => null);
          throw new Error(errorBody?.detail || `Request failed: ${response.status}`);
        }
        renderConditionResult(await response.json());
        conditionStatus.textContent = "Analysis complete.";
      } catch (err) {
        conditionStatus.textContent = "";
        renderError(conditionResults, `Property analysis failed: ${err.message}`);
      }
    });

    loadSources();
  </script>
</body>
</html>
